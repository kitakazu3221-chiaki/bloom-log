<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="530" r="200" fill="#34D399" opacity="0.2"/>
  <circle cx="1100" cy="100" r="250" fill="#6EE7B7" opacity="0.15"/>
  <!-- Seedling icon -->
  <g transform="translate(600,200)">
    <rect x="-8" y="-40" width="16" height="70" rx="8" fill="#A7F3D0"/>
    <ellipse cx="-25" cy="-40" rx="22" ry="38" transform="rotate(-25 -25 -40)" fill="#6EE7B7"/>
    <ellipse cx="25" cy="-40" rx="22" ry="38" transform="rotate(25 25 -40)" fill="#34D399"/>
  </g>
  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold">Bloom Log</text>
  <!-- Subtitle JA -->
  <text x="600" y="410" text-anchor="middle" fill="#D1FAE5" font-family="Arial, Helvetica, sans-serif" font-size="32">頭皮記録アプリ｜薄毛治療の経過を写真で管理</text>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" fill="#A7F3D0" font-family="Arial, Helvetica, sans-serif" font-size="24">bloom-log.com</text>
</svg>
